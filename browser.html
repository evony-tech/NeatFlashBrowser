<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="themes/chrome-like.css">
    <style>
    /* This removes the light background and styles the buttons correctly */
    .nav-ctrl-btn {
        background: transparent;
        border: none;
        color: white;
        cursor: pointer;
        padding: 0 10px;
        height: 100%;
        font-size: 16px;
        outline: none;
        transition: background 0.2s;
    }

    .nav-ctrl-btn:hover {
        background-color: rgba(255, 255, 255, 0.1); /* Subtle hover effect */
    }

    /* Ensure the container is a flexbox so buttons stay on the right */
    #nav-body-ctrls {
        display: flex;
        flex-direction: row;
        align-items: center;
    }

    /* THE FIX: Hide ugly Chromium scrollbars from the UI menus! */
    ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
    }
</style>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #202124; height: 100vh; display: flex; flex-direction: column;">

    <div id="flash-tabs" style="display: none;">
        <embed id="FlashTab1" src="about:blank#404" width="320" height="200"></embed>
        <embed id="FlashTab2" src="about:blank#404" width="320" height="200"></embed>
        <embed id="FlashTab3" src="about:blank#404" width="320" height="200"></embed>
    </div>

    <div id="overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; background-color: rgba(0,0,0,0.8);">
        
        <div style="background-color: #2b2b2b; padding: 30px; border-radius: 10px; width: 400px; color: white; font-family: sans-serif; box-shadow: 0px 0px 20px black; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); max-height: 80vh; overflow-y: auto;">
            
            <h2 style="margin-top: 0; text-align: center;">⚙️ Settings & Favorites</h2>
            <hr style="border: 1px solid #444; margin-bottom: 20px;">
            <button onclick="makeDefaultBrowser()" style="cursor:pointer; font-weight: bold; font-size: 14px; color: white; background: #0275d8; border: none; padding: 10px; width: 100%; margin-bottom: 10px; border-radius: 5px;">🌐 Set default browser</button>
            <div style="margin-top: 15px; border-top: 1px solid #444; padding-top: 15px; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 15px;">
                <label style="color: #c9d1d9; font-weight: bold; font-size: 14px;">Select Secure (https) Browser:</label>
                <div style="margin-top: 8px;">
                    <select id="browser-dropdown" style="width: 100%; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 8px; border-radius: 4px; outline: none; font-size: 13px;">
                        <option value="">-- No Browser Selected (HTTPS Blocked) --</option>
                        <option value="custom">📁 Browse for Custom Executable...</option>
                    </select>
                </div>
            </div>
            <button onclick="dispachClearCache()" style="cursor:pointer; font-weight: bold; font-size: 14px; color: white; background: #d9534f; border: none; padding: 10px; width: 100%; margin-bottom: 10px; border-radius: 5px;">🗑️ Clear Cache & Restart</button>
            <button onclick="clearAllFavorites()" style="cursor:pointer; font-weight: bold; font-size: 14px; color: white; background: #f0ad4e; border: none; padding: 10px; width: 100%; margin-bottom: 10px; border-radius: 5px;">⚠️ Clear All Favorites</button>
            
            <button onclick="document.getElementById('overlay').style.display='none'" style="cursor:pointer; font-weight: bold; font-size: 14px; color: white; background: #5cb85c; border: none; padding: 10px; width: 100%; border-radius: 5px;">✅ Close Menu</button>
            <div style="text-align: center; color: #888; font-size: 12px; margin-top: 25px; border-top: 1px solid #444; padding-top: 15px; line-height: 1.5;">
                
                <b style="color: #bbb; font-size: 14px;">Neat Flash Browser</b><br>
                <span id="app-version-display">Version: Loading...</span><br>
                Engineered for The NEAT Botfather by Evony-Tech<br>
                <div style="margin-top: 5px;">
                    <a href="#" onclick="openGitHubLink(event)" style="color: #58a6ff; text-decoration: none; font-size: 13px;">Check for updates on GitHub</a>
                </div>
            </div>
        </div>
    </div>
    <div id="fav-backdrop" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 998;" onclick="document.getElementById('fav-dropdown').style.display='none'; this.style.display='none';"></div>
    <div id="fav-dropdown" style="display: none; position: absolute; top: 40px; right: 100px; width: 260px; background-color: #2b2b2b; border: 1px solid #555; border-radius: 5px; box-shadow: 0px 5px 15px rgba(0,0,0,0.8); z-index: 1000; color: white; padding: 15px; max-height: 500px; overflow-y: auto;">
        <div id="fav-dropdown-content"></div>
    </div>

    <div id="neat-header" style="display: flex; flex-direction: row; align-items: center; background-color: #202124; height: 35px; -webkit-app-region: drag;">
        <div id="nav-body-tabs" style="flex: 1; height: 35px;"></div>
        
        <div id="window-controls" style="display: flex; flex-direction: row; height: 35px; -webkit-app-region: no-drag;">
            
            <div class="button" id="min-button" style="display: flex; align-items: center; justify-content: center; padding: 0 15px; cursor: pointer; height: 100%;">
                <img src="icons/min-w-10.png" draggable="false" style="width: 10px; height: 10px; object-fit: contain;" />
            </div>
            
            <div class="button" id="max-button" style="display: flex; align-items: center; justify-content: center; padding: 0 15px; cursor: pointer; height: 100%;">
                <img src="icons/max-w-10.png" draggable="false" style="width: 10px; height: 10px; object-fit: contain;" />
            </div>
            
            <div class="button" id="close-button" style="display: flex; align-items: center; justify-content: center; padding: 0 15px; cursor: pointer; height: 100%;">
                <img src="icons/close-w-10.png" draggable="false" style="width: 10px; height: 10px; object-fit: contain;" />
            </div>
            
        </div>
    </div>

    <div id="nav-body-ctrls" style="-webkit-app-region: no-drag;"></div>
    <div id="nav-body-views" style="flex: 1; background-color: #202124;"></div>

    <script>
        const { ipcRenderer, remote } = require('electron');
        const Store = require('./store');
        const store = new Store({ configName: 'user-preferences' });
        
        const controls = document.getElementById('nav-body-ctrls');
        const neatHeader = document.getElementById('neat-header');
        const win = remote.getCurrentWindow();

        // 1. Define the Button Tool (Transparent by default)
        function addControlBtn(icon, title, clickFn) {
            let btn = document.createElement("button");
            btn.className = 'nav-ctrl-btn'; 
            btn.innerHTML = icon;
            btn.title = title;
            btn.onclick = clickFn;
            controls.appendChild(btn);
            return btn;
        }

        const enav = new (require('electron-navigation'))({
            defaultFavicons: true,
            newTabParams: ['http://neato3.com/neatflashbrowser', { icon: "clear", title: "Neat Flash Browser" }],
            newTabCallback: (url, options) => {
                options.webviewAttributes = { plugins: '' };
                options.postTabOpenCallback = webview => {
                    // THE FIX: Guard the inner webview from Address Bar typing!
                    webview.addEventListener('will-navigate', (e) => {
                        if (e.url.toLowerCase().startsWith('https://')) {
                            webview.stop(); // Abort the load inside Flash
                            remote.require('./index').openSecureUrl(e.url); // Send to Bouncer
                        }
                    });
                };
                return {options};
            }
        });

        // --- THE RENDERER BOUNCER: MONKEY PATCH ---
        const originalNewTab = enav.newTab;
        enav.newTab = function(url, options) {
            if (url && url.startsWith('https://')) {
                // FIX: Use the Smart Escape Pod instead of trusting Windows Shell
                remote.require('./index').openSecureUrl(url); 
                return; 
            }
            return originalNewTab.call(this, url, options);
        };

        // 3. CREATE BUTTONS (They appear AFTER the address bar on the right)
        addControlBtn('🏠', 'Set as Homepage', () => {
            let url = document.getElementById('nav-ctrls-url').value;
            if (url) remote.require('./index').sethome(url);
        });

        addControlBtn('⭐️', 'Favorites Menu', (e) => {
            let favMenu = document.getElementById('fav-dropdown');
            let backdrop = document.getElementById('fav-backdrop');
            if (favMenu.style.display === 'block') {
                favMenu.style.display = 'none';
                backdrop.style.display = 'none';
            } else {
                renderFavDropdown();
                favMenu.style.display = 'block';
                backdrop.style.display = 'block';
            }
            e.stopPropagation(); 
        });

        addControlBtn('➕', 'Zoom In', () => {
            let webview = document.querySelector('webview.active');
            if (webview) webview.setZoomFactor(webview.getZoomFactor() + 0.2);
        });

        addControlBtn('➖', 'Zoom Out', () => {
            let webview = document.querySelector('webview.active');
            if (webview) webview.setZoomFactor(webview.getZoomFactor() - 0.2);
        });

        addControlBtn('🔳️', 'FullScreen', toggleFullscreen);
        addControlBtn('⚙️', 'Settings', () => document.getElementById('overlay').style.display = 'block');

        // 4. THE HYBRID ROUTER
        const args = remote.process.argv;
        const urlArg = args.find(a => a.startsWith('--neat-url=') || a.startsWith('--url='));
        const titleArg = args.find(a => a.startsWith('--neat-title=') || a.startsWith('--title='));

        let passedUrl = urlArg ? decodeURIComponent(urlArg.replace(/--neat-url=|--url=/, '')) : (args.find(a => a.startsWith('http')) || 'none');
        let passedTitle = titleArg ? decodeURIComponent(titleArg.replace(/--neat-title=|--title=/, '')) : 'Neat Flash Browser';

        if (passedUrl !== "none" && passedUrl.startsWith('http://')) {
            enav.newTab(passedUrl, { title: passedTitle });
            
            // FIX: Only auto-save on initial boot if the strict Botfather flag was present
            if (urlArg) {
                saveToFavorites(passedUrl, passedTitle);
            }
        } else {
            enav.newTab('http://neato3.com/neatflashbrowser', { icon: "clear", title: "Neat Flash Browser" });
        }

        // 5. TAB & FAVORITE UTILS
        ipcRenderer.on('open-new-tab', (event, data) => {
            const newUrl = data.url ? decodeURIComponent(data.url) : 'none';
            const newTitle = data.title ? decodeURIComponent(data.title) : 'Neat Flash Browser';
            
            // THE FIX: Whitelist "data:" so our Error Page can spawn!
            if (newUrl !== "none" && (newUrl.startsWith('http') || newUrl.startsWith('data:'))) {
                enav.newTab(newUrl, { title: newTitle });
                
                if (data.isBotfather && newUrl.startsWith('http')) {
                    saveToFavorites(newUrl, newTitle);
                }
            }
        });

        function saveToFavorites(url, title) {
            let favs = store.get('favorites') || [];
            favs = favs.map(f => typeof f === 'string' ? { url: f, title: 'Saved Link' } : f);
            let existingIndex = favs.findIndex(f => f.url === url);
            if (existingIndex === -1) {
                favs.push({ url: url, title: title });
                store.set('favorites', favs);
            }
        }

        function renderFavDropdown() {
            let container = document.getElementById('fav-dropdown-content');
            container.innerHTML = ""; 
            
            let addBtn = document.createElement('button');
            addBtn.innerHTML = "➕ Add Current Tab";
            addBtn.style.cssText = "width: 100%; padding: 8px; background: #5cb85c; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 15px; font-weight: bold;";
            addBtn.onclick = () => {
                let activeTab = document.querySelector('webview.active');
                if (activeTab) saveToFavorites(activeTab.getURL(), activeTab.getTitle());
                renderFavDropdown();
            };
            container.appendChild(addBtn);

            let favs = store.get('favorites') || [];
            let groups = {};
            favs.forEach((fav, idx) => {
                let title = (typeof fav === 'string' ? 'Saved Link' : fav.title) || 'Saved Link';
                let server = "Other";
                let name = title;
                let match = title.match(/^\[(.*?)\]\s*(.*)$/);
                if (match) { server = match[1].toUpperCase(); name = match[2]; }
                if (!groups[server]) groups[server] = [];
                
                // THE FIX: We now pass the "fullTitle" so the edit box loads the brackets!
                groups[server].push({ url: fav.url, name: name, fullTitle: title, idx: idx });
            });

            for (let srv in groups) {
                let det = document.createElement('details');
                let sum = document.createElement('summary');
                sum.innerHTML = `📁 <b>${srv}</b>`;
                sum.style.cursor = "pointer";
                sum.style.padding = "6px";
                sum.style.backgroundColor = "#3a3a3a";
                sum.style.borderRadius = "3px";
                sum.style.userSelect = "none";
                det.appendChild(sum);
                
                let list = document.createElement('div');
                list.style.padding = "5px 0px 5px 15px";

                groups[srv].forEach(item => {
                    let itemDiv = document.createElement('div');
                    itemDiv.style.display = "flex";
                    itemDiv.style.justifyContent = "space-between";
                    itemDiv.style.alignItems = "center";
                    itemDiv.style.padding = "5px 0";
                    itemDiv.style.borderBottom = "1px solid #444";

                    let a = document.createElement('a');
                    a.innerHTML = item.name;
                    a.href = "#";
                    a.style.color = "#00BFFF";
                    a.style.textDecoration = "none";
                    a.style.flex = "1";
                    a.style.whiteSpace = "nowrap";
                    a.style.overflow = "hidden";
                    a.style.textOverflow = "ellipsis";
                    a.onclick = (e) => { 
                        e.preventDefault();
                        enav.newTab(item.url); 
                        document.getElementById('fav-dropdown').style.display='none'; 
                        document.getElementById('fav-backdrop').style.display='none';
                    };

                    // --- THE FIX: RENAME & DELETE BUTTONS ---
                    let editBtn = document.createElement('span');
                    editBtn.innerHTML = "✏️";
                    editBtn.style.cursor = "pointer";
                    editBtn.style.fontSize = "12px";
                    editBtn.style.marginLeft = "10px";
                    editBtn.title = "Rename Bookmark";
                    
                    let delBtn = document.createElement('span');
                    delBtn.innerHTML = "❌";
                    delBtn.style.cursor = "pointer";
                    delBtn.style.fontSize = "12px";
                    delBtn.style.marginLeft = "10px";
                    delBtn.title = "Delete Bookmark";
                    
                    let actionDiv = document.createElement('div');
                    actionDiv.appendChild(editBtn);
                    actionDiv.appendChild(delBtn);

                    // --- INLINE EDITOR LOGIC ---
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        a.style.display = 'none'; // Hide the link
                        actionDiv.style.display = 'none'; // Hide the buttons

                        let editContainer = document.createElement('div');
                        editContainer.style.display = 'flex';
                        editContainer.style.flex = '1';

                        let input = document.createElement('input');
                        input.type = 'text';
                        input.value = item.fullTitle; // Loads the full "[ss82] Name" string
                        input.style.flex = '1';
                        input.style.background = '#21262d';
                        input.style.color = '#c9d1d9';
                        input.style.border = '1px solid #30363d';
                        input.style.padding = '2px 5px';
                        input.style.outline = 'none';
                        input.style.borderRadius = '3px';

                        let saveBtn = document.createElement('button');
                        saveBtn.innerHTML = "💾";
                        saveBtn.style.background = 'none';
                        saveBtn.style.border = 'none';
                        saveBtn.style.cursor = 'pointer';
                        saveBtn.style.marginLeft = '5px';

                        let saveAction = () => {
                            let newTitle = input.value.trim();
                            if (newTitle !== "") {
                                let currentFavs = store.get('favorites') || [];
                                currentFavs[item.idx].title = newTitle;
                                store.set('favorites', currentFavs);
                                renderFavDropdown(); // Instantly rebuilds and categorizes!
                            }
                        };

                        saveBtn.onclick = (ev) => { ev.stopPropagation(); saveAction(); };
                        input.onkeypress = (ev) => { if (ev.key === 'Enter') saveAction(); };

                        editContainer.appendChild(input);
                        editContainer.appendChild(saveBtn);
                        itemDiv.insertBefore(editContainer, itemDiv.firstChild);
                        input.focus();
                    };

                    delBtn.onclick = () => {
                        let currentFavs = store.get('favorites') || [];
                        currentFavs.splice(item.idx, 1); 
                        store.set('favorites', currentFavs);
                        renderFavDropdown(); 
                    };

                    itemDiv.appendChild(a);
                    itemDiv.appendChild(actionDiv);
                    list.appendChild(itemDiv);
                });
                det.appendChild(list);
                container.appendChild(det);
            }
        }

        // 6. WINDOW CONTROLS
        document.getElementById('min-button').addEventListener('click', () => win.minimize());
        document.getElementById('max-button').addEventListener('click', () => {
            win.isMaximized() ? win.unmaximize() : win.maximize();
        });
        document.getElementById('close-button').addEventListener('click', () => win.close());

        // 7. FULLSCREEN SYNC
        let isFullScreen = false;
        function toggleFullscreen() {
            isFullScreen = !isFullScreen;
            ipcRenderer.send('fullScreen-click');
            neatHeader.style.display = isFullScreen ? "none" : "flex";
            controls.style.display = isFullScreen ? "none" : "block";
        }

        // 8. VERSION & SETTINGS
        document.getElementById('app-version-display').innerText = "Version " + remote.app.getVersion();
        window.dispachClearCache = () => ipcRenderer.send('clearChache-click');
        window.clearAllFavorites = () => remote.require('./index.js').removeAllFav();
        window.makeDefaultBrowser = () => {
            // 1. Injects the required Registry Keys so Windows knows this app is a browser
            remote.app.setAsDefaultProtocolClient('http');
            
            // 2. Safely open the Default Apps menu for Windows users
            if (process.platform === 'win32') {
                remote.shell.openExternal('ms-settings:defaultapps');
            } else if (process.platform === 'darwin') {
                // Failsafe for Mac users trying to click it
                remote.dialog.showMessageBox(remote.getCurrentWindow(), {
                    type: 'info',
                    title: 'Mac OS',
                    message: 'Please go to System Preferences > General to change your default browser.'
                });
            }
        };

        // ==========================================
        // 9. SMART SECURE BROWSER AUTO-DETECTION
        // ==========================================
        const { dialog } = remote;
        const fs = require('fs');

        window.openGitHubLink = (e) => {
            e.preventDefault();
            remote.require('./index').openSecureUrl("https://github.com/evony-tech/NeatFlashBrowser/releases");
        };

        const browserDropdown = document.getElementById('browser-dropdown');
        let savedBrowserPath = store.get('secureBrowserPath') || '';

        // 1. Scan the OS for installed browsers
        function getCommonBrowsers() {
            const browsers = [];
            const isWin = process.platform === 'win32';
            const isMac = process.platform === 'darwin';

            if (isWin) {
                const paths = {
                    'Google Chrome': [
                        process.env.PROGRAMFILES + '\\Google\\Chrome\\Application\\chrome.exe',
                        process.env['PROGRAMFILES(X86)'] + '\\Google\\Chrome\\Application\\chrome.exe',
                        process.env.LOCALAPPDATA + '\\Google\\Chrome\\Application\\chrome.exe'
                    ],
                    'Microsoft Edge': [
                        process.env['PROGRAMFILES(X86)'] + '\\Microsoft\\Edge\\Application\\msedge.exe',
                        process.env.PROGRAMFILES + '\\Microsoft\\Edge\\Application\\msedge.exe'
                    ],
                    'Mozilla Firefox': [
                        process.env.PROGRAMFILES + '\\Mozilla Firefox\\firefox.exe',
                        process.env['PROGRAMFILES(X86)'] + '\\Mozilla Firefox\\firefox.exe'
                    ]
                };
                for (const [name, possiblePaths] of Object.entries(paths)) {
                    for (const p of possiblePaths) {
                        if (p && fs.existsSync(p)) {
                            browsers.push({ name: name, path: p });
                            break;
                        }
                    }
                }
            } else if (isMac) {
                const paths = {
                    'Google Chrome': '/Applications/Google Chrome.app',
                    'Microsoft Edge': '/Applications/Microsoft Edge.app',
                    'Mozilla Firefox': '/Applications/Firefox.app',
                    'Safari': '/Applications/Safari.app'
                };
                for (const [name, p] of Object.entries(paths)) {
                    if (fs.existsSync(p)) {
                        browsers.push({ name: name, path: p });
                    }
                }
            }
            return browsers;
        }

        // 2. Populate the Dropdown Menu
        function populateDropdown() {
            const detectedBrowsers = getCommonBrowsers();
            
            // Clear old options (keep the first 'Empty' and last 'Custom' options)
            while (browserDropdown.options.length > 2) {
                browserDropdown.remove(1);
            }

            // Inject detected browsers
            detectedBrowsers.reverse().forEach(b => {
                let opt = document.createElement('option');
                opt.value = b.path;
                opt.text = `🌐 ${b.name}`;
                browserDropdown.add(opt, 1);
            });

            // If their saved path is custom, inject it so the dropdown selects it
            if (savedBrowserPath) {
                let pathExists = Array.from(browserDropdown.options).some(opt => opt.value === savedBrowserPath);
                if (!pathExists && savedBrowserPath !== 'custom') {
                    let opt = document.createElement('option');
                    opt.value = savedBrowserPath;
                    opt.text = `🔧 Custom Executable`;
                    browserDropdown.add(opt, browserDropdown.options.length - 1);
                }
                browserDropdown.value = savedBrowserPath;
            } else {
                browserDropdown.value = "";
            }
        }

        populateDropdown();

        // 3. Handle User Selection
        browserDropdown.addEventListener('change', async (e) => {
            const selectedVal = e.target.value;

            if (selectedVal === 'custom') {
                const isWin = process.platform === 'win32';
                const isMac = process.platform === 'darwin';
                const filters = [];
                if (isWin) filters.push({ name: 'Browser Executable', extensions: ['exe'] });
                else if (isMac) filters.push({ name: 'Mac Application', extensions: ['app'] });

                const result = await dialog.showOpenDialog(remote.getCurrentWindow(), {
                    properties: ['openFile'],
                    filters: filters
                });

                if (!result.canceled && result.filePaths.length > 0) {
                    savedBrowserPath = result.filePaths[0];
                    store.set('secureBrowserPath', savedBrowserPath);
                    populateDropdown(); // Refresh UI to show the new custom file
                } else {
                    browserDropdown.value = savedBrowserPath || ""; // Revert if cancelled
                }
            } else {
                savedBrowserPath = selectedVal;
                store.set('secureBrowserPath', savedBrowserPath);
            }
        });
    </script>
    </body>
</html>
